apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawbuddy-backend
  namespace: clawbuddy-system
  labels:
    app: clawbuddy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawbuddy-backend
  template:
    metadata:
      labels:
        app: clawbuddy-backend
    spec:
      imagePullSecrets:
        - name: cr-pull-secret
      containers:
        - name: clawbuddy-backend
          image: <YOUR_REGISTRY>/<YOUR_NAMESPACE>/clawbuddy-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: clawbuddy-backend-env
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: clawbuddy-backend
  namespace: clawbuddy-system
  labels:
    app: clawbuddy-backend
spec:
  type: ClusterIP
  selector:
    app: clawbuddy-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
